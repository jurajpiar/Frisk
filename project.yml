name: Frisk

options:
  bundleIdPrefix: org.deadkittens
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# ZIPFoundation (D2) — pure-Swift zip reader, shared by the app and both extensions.
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"
  # Apple's Markdown parser (cmark-gfm) — used to render rich markdown previews in-app.
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    branch: main
  # Pure-Swift readers for non-zip archives (tar, gzip, bzip2, xz, 7z).
  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: "4.8.0"
  # Over-the-air updates; the appcast feed is hosted and signed via Amore.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.8.0"

# Signing: DEVELOPMENT_TEAM is supplied by Config/Signing.xcconfig (git-ignored). Copy
# Config/Signing.xcconfig.example → Config/Signing.xcconfig and set your Apple Development
# Team ID. Automatic signing; a free personal team is sufficient (no paid membership).
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

targets:
  Frisk:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Frisk
    dependencies:
      - package: ZIPFoundation
      - package: SWCompression
      - package: swift-markdown
        product: Markdown
      - package: Sparkle
      - target: PreviewExtension       # Quick Look preview appex (stage 05)
      # File Provider appex (stage 07) is blocked by an extension sandbox limit on this
      # setup (see 07_file_provider/outputs/STATUS.md) — not embedded in the v1 app.
      # - target: FileProviderExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.deadkittens.Frisk
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_ENTITLEMENTS: Frisk/Frisk.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES   # required for notarization
        DEVELOPMENT_LANGUAGE: en-GB
    info:
      path: Frisk/Info.plist
      properties:
        CFBundleDisplayName: Frisk
        CFBundleDevelopmentRegion: en_GB
        CFBundleIconFile: AppIcon
        # Reference the build settings so tools can override versions at archive
        # time (e.g. `amore release --build-number auto`).
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        # Sparkle update feed, hosted by Amore (org.deadkittens.Frisk).
        SUFeedURL: https://api.amore.computer/v1/apps/org.deadkittens.Frisk/appcast.xml
        SUPublicEDKey: fFawoODRsfWkOW2NIJzGhHtljzVgmxwEnIOGgf3ZQOg=
        # Required for Sparkle's installer XPC service under the App Sandbox.
        SUEnableInstallerLauncherService: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Archive
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.zip-archive
              - org.gnu.gnu-zip-archive
              - org.gnu.gnu-zip-tar-archive
              - public.bzip2-archive
              - public.tar-archive
              - org.7-zip.7-zip-archive
              - org.tukaani.xz-archive
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.7-zip.7-zip-archive
            UTTypeDescription: 7-Zip Archive
            UTTypeConformsTo:
              - public.data
              - public.archive
            UTTypeTagSpecification:
              public.filename-extension:
                - 7z
          - UTTypeIdentifier: org.tukaani.xz-archive
            UTTypeDescription: XZ Archive
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - xz
          - UTTypeIdentifier: org.gnu.gnu-zip-tar-archive
            UTTypeDescription: Gzip Tar Archive
            UTTypeConformsTo:
              - org.gnu.gnu-zip-archive
            UTTypeTagSpecification:
              public.filename-extension:
                - tgz
                - tar.gz

  PreviewExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PreviewExtension
      - path: Frisk/ArchiveCore
    dependencies:
      - package: ZIPFoundation
      - package: SWCompression
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.deadkittens.Frisk.PreviewExtension  # D9
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_ENTITLEMENTS: PreviewExtension/PreviewExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES   # required for notarization
    info:
      path: PreviewExtension/Info.plist
      properties:
        CFBundleDisplayName: Frisk Preview
        CFBundleDevelopmentRegion: en_GB
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewProvider
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              - public.zip-archive
              - com.pkware.zip-archive
              - org.gnu.gnu-zip-archive
              - org.gnu.gnu-zip-tar-archive
              - public.bzip2-archive
              - public.tar-archive
              - org.7-zip.7-zip-archive
              - org.tukaani.xz-archive

  FileProviderExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FileProviderExtension
      - path: Frisk/ArchiveCore          # shared reader/model
    dependencies:
      - package: ZIPFoundation
      - package: SWCompression
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.deadkittens.Frisk.FileProvider  # prefixed by host (D9)
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_ENTITLEMENTS: FileProviderExtension/FileProviderExtension.entitlements
        CODE_SIGN_STYLE: Automatic
    info:
      path: FileProviderExtension/Info.plist
      properties:
        CFBundleDisplayName: Frisk File Provider
        CFBundleDevelopmentRegion: en_GB
        NSExtension:
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ArchiveFileProviderExtension
          NSExtensionFileProviderDocumentGroup: group.org.deadkittens.frisk
          NSExtensionFileProviderSupportsEnumeration: true

  FriskTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FriskTests
    dependencies:
      - target: Frisk
      - package: ZIPFoundation
      - package: SWCompression
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.deadkittens.FriskTests
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic

schemes:
  Frisk:
    build:
      targets:
        Frisk: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FriskTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
